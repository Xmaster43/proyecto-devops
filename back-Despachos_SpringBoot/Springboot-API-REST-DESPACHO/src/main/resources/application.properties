spring.application.name=Springboot-API-REST
server.port=8081
spring.web.allow-cors=true

# Configuración de la base de datos MySQL en AWS RDS
spring.datasource.url=jdbc:mysql://${DB_ENDPOINT:mysql}:${DB_PORT:3306}/${DB_NAME:innovatech_db}?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.platform=mysql

# Configuración de Hibernate
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.swagger-ui.path=/swagger-ui.html