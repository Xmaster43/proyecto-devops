version: '3.9'

services:
  mysql:
    image: mysql:8.0-alpine
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: innovatech_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - innovatech-network

  backend-despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: backend-despachos
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/innovatech_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - innovatech-network

  backend-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: backend-ventas
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/innovatech_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8082:8080"
    depends_on:
      - mysql
    networks:
      - innovatech-network

  frontend-despacho:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: frontend-despacho
    ports:
      - "3000:80"
    depends_on:
      - backend-despachos
    networks:
      - innovatech-network

volumes:
  mysql_data:
    driver: local

networks:
  innovatech-network:
    driver: bridge